services:
  museo-app:
    build: .
    container_name: museo-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/instance/bioscan.db
      CHROMA_PATH: /app/chroma_db
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_URL: http://ollama:11434/api/chat
      OLLAMA_EMBED_URL: http://ollama:11434/api/embed
    ports:
      - "5000:5000"
    volumes:
      - ./instance:/app/instance
      - ./chroma_db:/app/chroma_db
      - ./static/uploads:/app/static/uploads
    depends_on:
      - ollama

  servertts:
    build:
      context: ./Servertts
      dockerfile: Dockerfile
    container_name: servertts
    restart: unless-stopped
    environment:
      MUSEO_API_BASE_URL: http://museo-app:5000
      MUSEO_API_KEY: ${MUSEO_TTS_SHARED_KEY}
      MUSEO_TTS_PUBLIC_BASE_URL: ${MUSEO_TTS_PUBLIC_BASE_URL:-}
      TTS_API_KEY: ${TTS_API_KEY}
      EDGE_TTS_VOICE: ${EDGE_TTS_VOICE:-es-CO-GonzaloNeural}
      EDGE_TTS_RATE: ${EDGE_TTS_RATE:-+0%}
      EDGE_TTS_VOLUME: ${EDGE_TTS_VOLUME:-+0%}
      AUDIO_CACHE_DIR: /app/cache_audio
      DEBUG_FRAMES_DIR: /app/debug_frames
    ports:
      - "8010:8010"
    volumes:
      - ./Servertts/cache_audio:/app/cache_audio
      - ./Servertts/debug_frames:/app/debug_frames
    depends_on:
      - museo-app

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3.5:4b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    volumes:
      - ./ollama:/root/.ollama
      - ./docker/ollama-init.sh:/ollama-init.sh:ro
    entrypoint: [ "/bin/sh", "/ollama-init.sh" ]

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: [ "http", "http://museo-app:5000" ]
    ports:
      - "4040:4040"
    depends_on:
      - museo-app

  ngrok-tts:
    image: ngrok/ngrok:latest
    container_name: ngrok-tts
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_TTS_AUTHTOKEN}
    command: [ "http", "http://servertts:8010" ]
    ports:
      - "4041:4040"
    depends_on:
      - servertts
