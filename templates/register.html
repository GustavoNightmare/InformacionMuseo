{% extends "base.html" %}
{% block title %}Registro | BioScan{% endblock %}
{% block content %}
<div class="max-w-md mx-auto rounded-3xl border border-emerald-100 bg-white p-6 shadow-sm">
    <h1 class="text-2xl font-semibold">Crear cuenta</h1>
    <p class="text-sm text-slate-600 mt-1">Regístrate para guardar tu recorrido y memoria del chat.</p>

    <form class="mt-4 space-y-3" method="post" action="{{ url_for('register_post') }}">
        <input name="nombre" placeholder="Nombre completo"
            class="w-full rounded-2xl border border-slate-200 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-200" />

        <input name="edad" type="number" min="1" max="120" placeholder="Edad"
            class="w-full rounded-2xl border border-slate-200 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-200" />

        <input name="username" placeholder="Nombre de usuario"
            class="w-full rounded-2xl border border-slate-200 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-200" />

        <input type="password" name="password" placeholder="Contraseña (mínimo 6)"
            class="w-full rounded-2xl border border-slate-200 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-200" />

        <input type="password" name="password2" placeholder="Confirmar contraseña"
            class="w-full rounded-2xl border border-slate-200 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-200" />

        <button class="w-full rounded-2xl bg-emerald-600 px-4 py-2 text-white text-sm font-medium hover:bg-emerald-700">
            Registrarme
        </button>
    </form>

    <div class="mt-4 text-sm text-slate-600">
        ¿Ya tienes cuenta?
        <a class="text-emerald-700 hover:underline" href="{{ url_for('login') }}">Inicia sesión</a>
    </div>
</div>
{% endblock %}
